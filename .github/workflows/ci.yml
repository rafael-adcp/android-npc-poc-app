name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit tests, lint e build debug
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.*
          if-no-files-found: ignore

  instrumented-tests:
    name: Testes instrumentados (e2e) em emulador
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      matrix:
        api-level: [31]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build test APKs
        run: ./gradlew assembleDebugAndroidTest --stacktrace

      - name: Run e2e tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew createDebugAndroidTestCoverageReport --stacktrace

      - name: Extract coverage percentage
        if: success()
        id: coverage
        run: |
          REPORT="app/build/reports/coverage/androidTest/debug/connected/index.html"
          if [ -f "$REPORT" ]; then
            PCT=$(grep -oP 'class="ctr2">\K[0-9]+%' "$REPORT" | head -1 | tr -d '%')
            echo "pct=$PCT" >> $GITHUB_OUTPUT
            if [ "$PCT" -ge 80 ]; then COLOR=brightgreen
            elif [ "$PCT" -ge 60 ]; then COLOR=yellow
            else COLOR=red; fi
            echo "color=$COLOR" >> $GITHUB_OUTPUT
            echo "## 📊 Code Coverage: ${PCT}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "pct=0" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
            echo "## ⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update coverage badge in README
        if: success() && github.ref == 'refs/heads/main'
        run: |
          PCT="${{ steps.coverage.outputs.pct }}"
          COLOR="${{ steps.coverage.outputs.color }}"
          sed -i "s|coverage-[0-9]*%25-[a-z]*|coverage-${PCT}%25-${COLOR}|" README.md
          if git diff --quiet README.md; then
            echo "Badge already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "ci: update coverage badge to ${PCT}%"
            git push
          fi

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/reports/coverage/
          if-no-files-found: ignore
